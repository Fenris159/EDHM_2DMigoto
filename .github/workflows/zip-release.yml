name: Zip Release


on:
  push:
    tags:
      # Trigger on tags (i.e. v1.0.0, v2.1.0, etc)
      - 'v*'
      

permissions:
  contents: write


jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Add MSBuild for VS2022 to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '[17.0,18.0)'

    - name: Build solution
      run: msbuild EDHM_2DMigoto.sln -property:Configuration="Zip Release" -property:Platform=x64 -target:rebuild -verbosity:minimal

    - name: Zip EDHM DLLs
      shell: pwsh
      run: |
        $out = './x64/Zip Release'
        $dlls = @('d3d11.dll', 'd3dcompiler_47.dll') | ForEach-Object {
          Join-Path $out $_
        } | Where-Object { Test-Path $_ }
        if (-not $dlls) {
          throw "No d3d11.dll / d3dcompiler_47.dll found under $out"
        }
        Compress-Archive -Path $dlls -DestinationPath './LibrariesTemp.zip' -Force

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        release_name: ${{ github.ref_name }}
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Zip as Release Asset
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: './LibrariesTemp.zip'
        asset_name: EDHM-2DMigoto-${{ github.ref_name }}.zip
        asset_content_type: application/zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
